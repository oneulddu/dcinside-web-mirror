<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        (function () {
            "use strict";

            var theme = "dark";
            try {
                theme = window.localStorage.getItem("mirror_theme_v1") === "light" ? "light" : "dark";
            } catch (err) {
                theme = "dark";
            }

            var root = document.documentElement;
            root.dataset.theme = theme;
            root.style.colorScheme = theme;

            if (theme !== "light") {
                return;
            }

            var lightVariables = {
                "--page-bg": "#f4f4f5",
                "--shell-bg": "#ffffff",
                "--shell-border": "rgba(24, 24, 27, 0.10)",
                "--header-top": "rgba(255, 255, 255, 0.88)",
                "--header-tab": "#ffffff",
                "--text-main": "#27272a",
                "--text-title": "#09090b",
                "--text-sub": "#52525b",
                "--text-soft": "#71717a",
                "--blue": "#2563eb",
                "--blue-hover": "#1d4ed8"
            };

            Object.keys(lightVariables).forEach(function (name) {
                root.style.setProperty(name, lightVariables[name]);
            });
        })();
    </script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>{{ title or "머숨 미러" }}</title>
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <div class="header-top">
                <div class="header-left">
                    <a class="brand" href="/">머숨 <span>머숨들의 휴식공간</span></a>
                </div>
                <button class="theme-toggle" type="button" aria-label="어두운 테마 사용 중, 밝은 테마로 전환" aria-pressed="false" title="밝은 테마로 전환">☀</button>
            </div>
            <nav class="main-tabs">
                {% if board is defined and board %}
                <a class="tab-item {% if nav_tab == 'all' %}active{% endif %}" href="/board?board={{ board }}&recommend=0&page=1{% if kind %}&kind={{ kind }}{% endif %}">전체</a>
                <a class="tab-item {% if nav_tab == 'best' %}active{% endif %}" href="/board?board={{ board }}&recommend=1&page=1{% if kind %}&kind={{ kind }}{% endif %}">베스트</a>
                {% else %}
                <a class="tab-item {% if nav_tab == 'all' %}active{% endif %}" href="/">전체</a>
                <a class="tab-item {% if nav_tab == 'best' %}active{% endif %}" href="/board?board=dcbest&recommend=0&page=1">베스트</a>
                {% endif %}
                <a class="tab-item {% if nav_tab == 'recent' %}active{% endif %}" href="/recent">최근</a>
                <a class="tab-item" href="/board?board=100toron&recommend=0&page=1">⚔ 토론장</a>
            </nav>
        </header>

        <section class="content-wrap">
            {% block content %}{% endblock %}
        </section>
    </main>
    <script src="{{ url_for('static', filename='javascript/read_state.js') }}"></script>
</body>
</html>
