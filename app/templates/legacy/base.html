<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        (function () {
            "use strict";

            var theme = "dark";
            var dcconBlocked = false;
            try {
                theme = window.localStorage.getItem("mirror_theme_v1") === "light" ? "light" : "dark";
                dcconBlocked = window.localStorage.getItem("mirror_dccon_block_v1") === "1";
            } catch (err) {
                theme = "dark";
                dcconBlocked = false;
            }

            var root = document.documentElement;
            root.dataset.theme = theme;
            root.dataset.dcconBlocked = dcconBlocked ? "true" : "false";
            root.style.colorScheme = theme;
        })();
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="{{ static_url('legacy/css/main.css') }}">
    <title>{{ title or "숨터" }}</title>
    {% if social_meta %}
    <meta property="og:site_name" content="{{ social_meta.site_name }}">
    <meta property="og:type" content="{{ social_meta.type }}">
    <meta property="og:title" content="{{ social_meta.title }}">
    <meta property="og:description" content="{{ social_meta.description }}">
    <meta property="og:url" content="{{ social_meta.url }}">
    <meta name="twitter:card" content="{{ social_meta.twitter_card }}">
    <meta name="twitter:title" content="{{ social_meta.title }}">
    <meta name="twitter:description" content="{{ social_meta.description }}">
    {% if social_meta.image %}
    <meta property="og:image" content="{{ social_meta.image }}">
    <meta property="og:image:secure_url" content="{{ social_meta.image }}">
    <meta property="og:image:alt" content="{{ social_meta.image_alt }}">
    <meta name="twitter:image" content="{{ social_meta.image }}">
    <meta name="twitter:image:alt" content="{{ social_meta.image_alt }}">
    {% endif %}
    {% endif %}
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <div class="header-top">
                <div class="header-left">
                    <a class="brand" href="/legacy/">숨터 <span>가볍게 읽는 공간</span></a>
                </div>
                <div class="header-actions">
                    <button class="dccon-toggle" type="button" aria-label="이모티콘 자동 차단 전환" aria-pressed="false" title="이모티콘 자동 차단">▧</button>
                    <button class="theme-toggle" type="button" aria-label="어두운 테마 사용 중, 밝은 테마로 전환" aria-pressed="false" title="밝은 테마로 전환">☀</button>
                </div>
            </div>
            <nav class="main-tabs">
                {% if board is defined and board %}
                <a class="tab-item {% if nav_tab == 'all' %}active{% endif %}" href="{{ board_url(board, recommend=0, page=1, kind=kind, head_id=head_id|default(none)) }}">전체</a>
                <a class="tab-item {% if nav_tab == 'best' %}active{% endif %}" href="{{ board_url(board, recommend=1, page=1, kind=kind, head_id=head_id|default(none)) }}">베스트</a>
                {% else %}
                <a class="tab-item {% if nav_tab == 'all' %}active{% endif %}" href="/legacy/">전체</a>
                <a class="tab-item {% if nav_tab == 'best' %}active{% endif %}" href="{{ board_url('dcbest', recommend=0, page=1) }}">베스트</a>
                {% endif %}
                <a class="tab-item {% if nav_tab == 'recent' %}active{% endif %}" href="/legacy/recent">최근</a>
            </nav>
        </header>

        <section class="content-wrap">
            {% block content %}{% endblock %}
        </section>
    </main>
    <script src="{{ static_url('legacy/javascript/read_state.js') }}"></script>
</body>
</html>
