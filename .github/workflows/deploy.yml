name: Deploy To Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        env:
          MIRROR_ENV: development
        run: make test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          umask 077
          KEY_FILE="${RUNNER_TEMP}/deploy_key"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${KEY_FILE}"

          ssh -i "${KEY_FILE}" \
            -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" <<'EOF'
            set -e
            cd /home/ubuntu/mirror
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ ! -d .venv ]; then
              python3 -m venv .venv
            fi
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt

            python - <<'PY'
            from pathlib import Path
            import os
            import secrets
            import stat

            env_path = Path(".env")
            lines = env_path.read_text(encoding="utf-8").splitlines() if env_path.exists() else []

            def has_non_empty(name):
              prefix = f"{name}="
              for line in lines:
                stripped = line.strip()
                if stripped.startswith(prefix) and stripped[len(prefix):].strip().strip("'\""):
                  return True
              return bool(os.environ.get(name, "").strip())

            if not has_non_empty("MIRROR_ENV"):
              lines.append("MIRROR_ENV=production")
            if not has_non_empty("MIRROR_SECRET_KEY"):
              lines.append(f"MIRROR_SECRET_KEY={secrets.token_urlsafe(48)}")

            env_path.write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")
            env_path.chmod(stat.S_IRUSR | stat.S_IWUSR)
            PY

            PM2_BIN="$(command -v pm2 || true)"
            if [ -z "${PM2_BIN}" ] && [ -x "/home/ubuntu/.nvm/versions/node/v24.11.1/bin/pm2" ]; then
              PM2_BIN="/home/ubuntu/.nvm/versions/node/v24.11.1/bin/pm2"
            fi
            if [ -z "${PM2_BIN}" ]; then
              echo "pm2 not found on server PATH"
              exit 1
            fi

            "${PM2_BIN}" reload ecosystem.config.js --only dc-mirror --update-env || "${PM2_BIN}" start ecosystem.config.js --only dc-mirror
            "${PM2_BIN}" save
          EOF

      - name: Verify remote commit
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          umask 077
          KEY_FILE="${RUNNER_TEMP}/deploy_key"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${KEY_FILE}"

          CURRENT=$(ssh -i "${KEY_FILE}" \
            -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            'cd /home/ubuntu/mirror && git rev-parse HEAD')

          echo "current=${CURRENT}"
          echo "target=${GITHUB_SHA}"
          test "${CURRENT}" = "${GITHUB_SHA}"
