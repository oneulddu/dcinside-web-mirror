name: Deploy To Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          umask 077
          KEY_FILE="${RUNNER_TEMP}/deploy_key"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${KEY_FILE}"

          ssh -i "${KEY_FILE}" \
            -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" <<'EOF'
            set -e
            cd /home/ubuntu/mirror
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ -d .venv ]; then
              . .venv/bin/activate
              pip install -r requirements.txt
            fi

            PM2_BIN="$(command -v pm2 || true)"
            if [ -z "${PM2_BIN}" ] && [ -x "/home/ubuntu/.nvm/versions/node/v24.11.1/bin/pm2" ]; then
              PM2_BIN="/home/ubuntu/.nvm/versions/node/v24.11.1/bin/pm2"
            fi
            if [ -z "${PM2_BIN}" ]; then
              echo "pm2 not found on server PATH"
              exit 1
            fi

            "${PM2_BIN}" reload ecosystem.config.js --only dc-mirror --update-env || "${PM2_BIN}" start ecosystem.config.js --only dc-mirror
            "${PM2_BIN}" save
          EOF

      - name: Verify remote commit
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          umask 077
          KEY_FILE="${RUNNER_TEMP}/deploy_key"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${KEY_FILE}"

          CURRENT=$(ssh -i "${KEY_FILE}" \
            -p "${SSH_PORT}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            'cd /home/ubuntu/mirror && git rev-parse HEAD')

          echo "current=${CURRENT}"
          echo "target=${GITHUB_SHA}"
          test "${CURRENT}" = "${GITHUB_SHA}"
