name: Deploy To Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -e
            cd /home/ubuntu/mirror
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ -d .venv ]; then
              . .venv/bin/activate
              pip install -r requirements.txt
            fi

            PM2_BIN="$(command -v pm2 || true)"
            if [ -z "${PM2_BIN}" ] && [ -x "/home/ubuntu/.nvm/versions/node/v24.11.1/bin/pm2" ]; then
              PM2_BIN="/home/ubuntu/.nvm/versions/node/v24.11.1/bin/pm2"
            fi
            if [ -z "${PM2_BIN}" ]; then
              echo "pm2 not found on server PATH"
              exit 1
            fi

            "${PM2_BIN}" reload ecosystem.config.js --only dc-mirror --update-env || "${PM2_BIN}" start ecosystem.config.js --only dc-mirror
            "${PM2_BIN}" save

      - name: Verify remote commit
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -e
            cd /home/ubuntu/mirror
            CURRENT=$(git rev-parse HEAD)
            echo "current=${CURRENT}"
            echo "target=${GITHUB_SHA}"
            test "${CURRENT}" = "${GITHUB_SHA}"
